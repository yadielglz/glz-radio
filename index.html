<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#333">
    <title>GLZ Radio</title>
    <link rel="icon" href="images/generic-station-logo.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>GLZ Radio</h1>
        <p class="status" id="status">Ready</p>

        <div class="player">
            <div id="station-name" class="station-name">Choose a station</div>
            <div id="station-frequency" class="station-frequency"></div>
            <div class="controls">
                <button id="play-pause-btn" type="button">Play</button>
                <button id="stop-btn" type="button">Stop</button>
            </div>
        </div>

        <div class="station-list" id="station-list"></div>
    </div>

    <audio id="audio-player" preload="none" playsinline></audio>
    <script src="script.js"></script>
</body>
</html>
